<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="핑퐁타임">
  <meta name="theme-color" content="#0d0d14">
  <title>핑퐁타임 🏓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <!-- Kakao SDK -->
  <script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>

  <style>
    :root {
      --bg: #0d0d14;
      --bg2: #15151f;
      --bg3: #1c1c2a;
      --card: #1a1a28;
      --accent: #c8ff00;
      --accent2: #a0d600;
      --text: #f0f0ff;
      --text2: #9090b0;
      --text3: #5a5a78;
      --border: #2a2a3f;
      --red: #ff4d4d;
      --blue: #4d9fff;
      --green: #4dff91;
      --orange: #ffaa4d;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ───── LOGIN ───── */
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 32px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    #loginScreen::before {
      content: '';
      position: absolute;
      top: -120px; left: -120px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(200,255,0,0.12), transparent 70%);
      pointer-events: none;
    }

    #loginScreen::after {
      content: '';
      position: absolute;
      bottom: -100px; right: -80px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(77,159,255,0.1), transparent 70%);
      pointer-events: none;
    }

    .login-ball {
      font-size: 72px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-14px) rotate(5deg); }
    }

    .login-logo {
      font-size: 38px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -1.5px;
      margin-bottom: 8px;
    }

    .login-logo span { color: var(--accent); }

    .login-sub {
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 56px;
    }

    .kakao-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px;
      background: #FEE500;
      color: #191919;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 0 0 0 rgba(254,229,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .kakao-btn:hover { box-shadow: 0 0 24px rgba(254,229,0,0.35); }
    .kakao-btn:active { transform: scale(0.97); }

    .kakao-icon { width: 22px; height: 22px; }

    /* ───── MAIN APP ───── */
    #mainApp { display: none; padding-bottom: 76px; }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-logo {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .header-logo span { color: var(--accent); }

    .header-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
      cursor: pointer;
    }

    .header-avatar-text {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 15px;
      font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* Tabs */
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-btn {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 0 12px;
      border: none; background: none;
      color: var(--text3);
      font-size: 10px;
      font-family: inherit;
      font-weight: 700;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }

    .nav-btn .icon { font-size: 22px; }
    .nav-btn.active { color: var(--accent); }

    /* Section title */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }

    /* ───── MEETING CARDS ───── */
    .meeting-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }

    .meeting-card:active { transform: scale(0.99); }
    .meeting-card:hover { border-color: var(--text3); }

    .meeting-card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .meeting-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      line-height: 1.3;
    }

    .type-chip {
      font-size: 11px; font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .chip-regular { background: rgba(77,159,255,0.15); color: var(--blue); border: 1px solid rgba(77,159,255,0.3); }
    .chip-flash   { background: rgba(255,170,77,0.15);  color: var(--orange); border: 1px solid rgba(255,170,77,0.3); }

    .meeting-meta {
      display: flex; flex-direction: column;
      gap: 5px; margin-bottom: 12px;
    }

    .meta-row {
      display: flex; align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text2);
    }

    .meeting-card-bottom {
      display: flex; align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .count-text {
      font-size: 13px; color: var(--text2);
    }

    .count-text strong { color: var(--accent); font-weight: 700; }

    .attend-btn {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-join    { background: var(--accent); color: #000; }
    .btn-joined  { background: rgba(255,77,77,0.15); color: var(--red); border: 1px solid rgba(255,77,77,0.3); }
    .btn-full    { background: var(--bg3); color: var(--text3); cursor: default; }
    .btn-past    { background: var(--bg3); color: var(--text3); cursor: default; font-size: 12px; }

    /* ───── EMPTY STATE ───── */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text2);
    }

    .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .empty-sub { font-size: 14px; color: var(--text2); }

    /* ───── CREATE FORM ───── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px; font-weight: 700;
      color: var(--text2);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 13px 14px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .form-input::placeholder { color: var(--text3); }

    .form-input:focus, .form-select:focus {
      border-color: var(--accent);
    }

    .form-select option { background: var(--bg3); }

    .type-row { display: flex; gap: 8px; }

    .type-toggle {
      flex: 1; padding: 13px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-size: 14px; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .type-toggle.on {
      border-color: var(--accent);
      background: rgba(200,255,0,0.08);
      color: var(--accent);
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-size: 16px; font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: -0.3px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .submit-btn:active { opacity: 0.85; transform: scale(0.98); }

    /* ───── MEMBERS ───── */
    .member-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .member-ava {
      width: 46px; height: 46px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }

    .member-ava-text {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 18px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 15px; font-weight: 700; }
    .member-stat { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .lvl-chip {
      font-size: 11px; font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .lvl-초급  { background: rgba(77,255,145,0.15);  color: var(--green);  border: 1px solid rgba(77,255,145,0.3); }
    .lvl-중급  { background: rgba(77,159,255,0.15);  color: var(--blue);   border: 1px solid rgba(77,159,255,0.3); }
    .lvl-고급  { background: rgba(255,170,77,0.15);  color: var(--orange); border: 1px solid rgba(255,170,77,0.3); }
    .lvl-선수급 { background: rgba(255,77,77,0.15);   color: var(--red);    border: 1px solid rgba(255,77,77,0.3); }

    /* ───── PROFILE ───── */
    .profile-hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px 20px;
      text-align: center;
      margin-bottom: 14px;
    }

    .profile-ava-wrap { position: relative; display: inline-block; margin-bottom: 14px; }

    .profile-ava {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
    }

    .profile-ava-text {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 32px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid var(--accent);
    }

    .profile-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px; }

    .profile-stats {
      display: flex; gap: 10px;
      margin-top: 18px;
    }

    .stat-box {
      flex: 1;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 14px 8px;
      text-align: center;
    }

    .stat-num { font-size: 24px; font-weight: 900; color: var(--accent); }
    .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }

    .level-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-top: 10px;
    }

    .level-btn {
      padding: 14px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-size: 14px; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .level-btn.on { border-color: var(--accent); background: rgba(200,255,0,0.08); color: var(--accent); }

    .logout-btn {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-size: 15px; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .section-title-card {
      font-size: 13px; font-weight: 700;
      color: var(--text2);
      margin-bottom: 10px;
    }

    .form-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
    }

    /* ───── MODAL ───── */
    .modal-bg {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    .modal-bg.open { display: flex; }

    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 16px; letter-spacing: -0.3px; }

    .modal-info-block {
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-bottom: 16px;
    }

    .modal-info-row {
      font-size: 13px; color: var(--text2);
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }

    .modal-info-row:last-child { margin-bottom: 0; }

    .attendee-row {
      display: flex; align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .attendee-row:last-child { border-bottom: none; }

    .att-ava {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 14px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .att-name { font-size: 14px; font-weight: 600; flex: 1; }

    .attendee-label { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }

    .close-btn {
      width: 100%;
      padding: 14px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-size: 15px; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 16px;
    }

    /* ───── TOAST ───── */
    .toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--text);
      color: var(--bg);
      padding: 11px 20px;
      border-radius: 30px;
      font-size: 14px; font-weight: 700;
      opacity: 0;
      transition: all 0.28s;
      z-index: 500;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ───── CHAT ───── */
    .chat-wrap {
      display: flex; flex-direction: column;
      height: calc(100dvh - 56px - 76px);
    }

    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 12px 16px;
      display: flex; flex-direction: column;
      gap: 10px;
    }

    .chat-bubble-wrap {
      display: flex; gap: 8px;
      align-items: flex-end;
    }

    .chat-bubble-wrap.me { flex-direction: row-reverse; }

    .bubble-ava {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: #000; font-size: 13px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .bubble-ava img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }

    .bubble-content { max-width: 72%; }

    .bubble-name {
      font-size: 11px; color: var(--text2);
      margin-bottom: 3px; font-weight: 600;
    }

    .chat-bubble-wrap.me .bubble-name { text-align: right; }

    .bubble {
      padding: 10px 13px;
      border-radius: 16px;
      font-size: 14px; line-height: 1.45;
      word-break: break-word;
    }

    .bubble-other { background: var(--card); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
    .bubble-me    { background: var(--accent); color: #000; border-bottom-right-radius: 4px; }

    .bubble-time {
      font-size: 10px; color: var(--text3);
      margin-top: 3px;
    }

    .chat-bubble-wrap.me .bubble-time { text-align: right; }

    .chat-input-row {
      display: flex; gap: 8px;
      padding: 10px 16px 10px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .chat-input {
      flex: 1; padding: 11px 14px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      font-size: 14px; color: var(--text);
      font-family: inherit; outline: none;
    }

    .chat-input:focus { border-color: var(--accent); }

    .chat-send {
      padding: 11px 16px;
      background: var(--accent); color: #000;
      border: none; border-radius: 24px;
      font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      flex-shrink: 0;
    }

    /* ───── COMMENTS (in modal) ───── */
    .comment-section { margin-top: 16px; }
    .comment-label { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }

    .comment-item {
      display: flex; gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .comment-item:last-child { border-bottom: none; }

    .cmt-ava {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); color: #000;
      font-size: 12px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }

    .cmt-body { flex: 1; }
    .cmt-name { font-size: 12px; font-weight: 700; color: var(--accent); }
    .cmt-text { font-size: 13px; color: var(--text); margin-top: 2px; line-height: 1.4; }
    .cmt-time { font-size: 10px; color: var(--text3); margin-top: 2px; }

    .comment-input-row {
      display: flex; gap: 8px; margin-top: 10px;
    }

    .comment-input {
      flex: 1; padding: 10px 13px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      font-size: 13px; color: var(--text);
      font-family: inherit; outline: none;
    }

    .comment-input:focus { border-color: var(--accent); }

    .comment-send {
      padding: 10px 14px;
      background: var(--accent); color: #000;
      border: none; border-radius: 24px;
      font-size: 13px; font-weight: 700;
      font-family: inherit; cursor: pointer;
    }

    .chat-date-divider {
      text-align: center; font-size: 11px;
      color: var(--text3); margin: 6px 0;
    }
    /* ───── ADMIN ───── */
    .admin-overlay {
      display: none; position: fixed; inset: 0;
      background: var(--bg); z-index: 300;
      overflow-y: auto; padding-bottom: 40px;
    }
    .admin-overlay.open { display: block; }

    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);

async function loadUserAndBoot(token) {
  try {
    const res = await fetch('https://kapi.kakao.com/v2/user/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    handleKakaoUser(data);
  } catch(e) {
    alert('사용자 정보를 가져오지 못했어요 😢');
  }
}

function handleKakaoUser(res) {
  const id       = String(res.id);
  const nickname = res.kakao_account?.profile?.nickname || '탁구인';
  const img      = res.kakao_account?.profile?.profile_image_url || '';
  ME = { id, nickname, img };

  const ref = db.ref('pingpong/users/' + id);
  ref.once('value', snap => {
    const prev = snap.val();
    if (!prev) {
      ref.set({ nickname, img, level: '중급', joinedAt: Date.now() });
      ME.level = '중급';
    } else {
      ref.update({ nickname, img });
      ME.level = prev.level || '중급';
    }
    bootApp();
  });
}

function doLogout() {
  if (!confirm('로그아웃 하시겠어요?')) return;
  sessionStorage.removeItem('pp_token');
  ME = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ══════════════════════════════════════
//  APP BOOT
// ══════════════════════════════════════
function bootApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  renderHeaderAva();
  setDefaultDate();

  db.ref('pingpong/meetings').on('value', snap => {
    meetings = snap.val() || {};
    renderMeetings();
    renderProfile();
  });
  db.ref('pingpong/users').on('value', snap => {
    users = snap.val() || {};
    renderMembers();
  });
  listenNotice();

  // 출생년도 드롭다운 생성
  const bySelect = document.getElementById('birthYearInput');
  if (bySelect) {
    for (let y = 2010; y >= 1945; y--) {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y + '년생';
      bySelect.appendChild(opt);
    }
  }
}

// 페이지 로드 시 자동 처리
window.addEventListener('DOMContentLoaded', async () => {
  setupPWA();
  setDefaultDate();

  // 카카오 implicit flow: URL 해시에서 access_token 추출
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get('access_token');
    if (token) {
      sessionStorage.setItem('pp_token', token);
      window.history.replaceState({}, '', REDIRECT_URI);
      await loadUserAndBoot(token);
      return;
    }
  }

  // authorization code flow fallback
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  if (code) {
    await handleCode(code);
    return;
  }

  // 이미 로그인된 경우
  const token = sessionStorage.getItem('pp_token');
  if (token) {
    await loadUserAndBoot(token);
  }
});

function gotoTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab === 'chat') listenGlobalChat();
}

// ══════════════════════════════════════
//  MEETINGS
// ══════════════════════════════════════
function renderMeetings() {
  const now = new Date();
  const upcoming = [], past = [];

  Object.entries(meetings).forEach(([id, m]) => {
    const dt = new Date(m.date + 'T' + (m.time || '00:00'));
    (dt >= now ? upcoming : past).push({ id, ...m });
  });

  upcoming.sort((a, b) => (a.date + a.time) < (b.date + b.time) ? -1 : 1);
  past.sort((a, b)     => (a.date + a.time) < (b.date + b.time) ? 1 : -1);

  const upEl = document.getElementById('upcomingSection');
  const psEl = document.getElementById('pastSection');

  if (upcoming.length === 0) {
    upEl.innerHTML = `
      <div class="section-label">예정된 모임</div>
      <div class="empty">
        <div class="empty-icon">🏓</div>
        <div class="empty-title">예정된 모임이 없어요</div>
        <div class="empty-sub">아래 ➕ 버튼으로 모임을 만들어볼까요?</div>
      </div>`;
  } else {
    upEl.innerHTML = `<div class="section-label">예정된 모임 ${upcoming.length}개</div>`
      + upcoming.map(m => meetingCardHTML(m, false)).join('');
  }

  psEl.innerHTML = past.length === 0 ? '' :
    `<div class="section-label">지난 모임</div>` + past.slice(0, 6).map(m => meetingCardHTML(m, true)).join('');
}

function meetingCardHTML(m, isPast) {
  const attendees = m.attendees ? Object.keys(m.attendees) : [];
  const joined    = ME && attendees.includes(ME.id);
  const maxTxt    = m.maxPlayers >= 99 ? '제한없음' : m.maxPlayers + '명';
  const isFull    = m.maxPlayers < 99 && attendees.length >= m.maxPlayers;

  const chipClass = m.type === '정기' ? 'chip-regular' : 'chip-flash';
  const chipLabel = m.type === '정기' ? '📅 정기' : '⚡ 번개';

  let btn = '';
  if (isPast) {
    btn = `<button class="attend-btn btn-past">종료</button>`;
  } else if (joined) {
    btn = `<button class="attend-btn btn-joined" onclick="toggleAttend(event,'${m.id}')">참석취소</button>`;
  } else if (isFull) {
    btn = `<button class="attend-btn btn-full">마감</button>`;
  } else {
    btn = `<button class="attend-btn btn-join" onclick="toggleAttend(event,'${m.id}')">참석신청</button>`;
  }

  const isOwner = ME && m.createdBy === ME.id;
  const delBtn  = isOwner && !isPast
    ? `<button class="delete-btn" onclick="deleteMeeting(event,'${m.id}')">삭제</button>`
    : '';

  return `
  <div class="meeting-card" onclick="openDetail('${m.id}')">
    <div class="meeting-card-top">
      <div class="meeting-title">${m.title}</div>
      <span class="type-chip ${chipClass}">${chipLabel}</span>
    </div>
    <div class="meeting-meta">
      <div class="meta-row">📅 ${fmtDate(m.date)} ${m.time}${m.endtime ? ' ~ ' + m.endtime : ''}</div>
      <div class="meta-row">📍 ${m.location}</div>
      ${m.note ? `<div class="meta-row">📝 ${m.note}</div>` : ''}
    </div>
    <div class="meeting-card-bottom">
      <div class="count-text">참석 <strong>${attendees.length}</strong> / ${maxTxt}</div>
      <div style="display:flex;gap:8px;align-items:center;">
        ${delBtn}
        ${btn}
      </div>
    </div>
  </div>`;
}

function fmtDate(d) {
  const dt = new Date(d + 'T12:00:00');
  const day = ['일','월','화','수','목','금','토'][dt.getDay()];
  return `${dt.getMonth()+1}월 ${dt.getDate()}일 (${day})`;
}

async function toggleAttend(e, mid) {
  e.stopPropagation();
  if (!ME) return;
  const ref = db.ref(`pingpong/meetings/${mid}/attendees/${ME.id}`);
  const snap = await ref.once('value');
  if (snap.exists()) {
    await ref.remove();
    toast('참석을 취소했어요');
  } else {
    const m = meetings[mid];
    const cnt = m.attendees ? Object.keys(m.attendees).length : 0;
    if (m.maxPlayers < 99 && cnt >= m.maxPlayers) { toast('정원이 꽉 찼어요 😢'); return; }
    await ref.set(true);
    toast('참석 신청 완료! 🏓');
  }
}

async function deleteMeeting(e, mid) {
  e.stopPropagation();
  if (!confirm('이 모임을 삭제할까요?')) return;
  await db.ref(`pingpong/meetings/${mid}`).remove();
  toast('모임을 삭제했어요');
}

function openDetail(mid) {
  const m = { id: mid, ...meetings[mid] };
  const attendees = m.attendees ? Object.keys(m.attendees) : [];
  const maxTxt = m.maxPlayers >= 99 ? '제한없음' : m.maxPlayers + '명';

  document.getElementById('modalTitle').textContent = m.title;

  const attRows = attendees.length === 0
    ? `<div style="text-align:center;color:var(--text2);font-size:14px;padding:14px 0;">아직 참석자가 없어요</div>`
    : attendees.map(uid => {
        const u = users[uid] || { nickname: '탁구인' };
        return `
          <div class="attendee-row">
            <div class="att-ava">${(u.nickname||'?')[0]}</div>
            <div class="att-name">${u.nickname || '탁구인'}</div>
            ${u.level ? `<span class="lvl-chip lvl-${u.level}">${u.level}</span>` : ''}
          </div>`;
      }).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-info-block">
      <div class="modal-info-row">📅 ${fmtDate(m.date)} ${m.time}${m.endtime ? ' ~ ' + m.endtime : ''}</div>
      <div class="modal-info-row">📍 ${m.location}</div>
      <div class="modal-info-row">👥 최대 ${maxTxt}</div>
      ${m.note ? `<div class="modal-info-row">📝 ${m.note}</div>` : ''}
    </div>
    <div class="attendee-label">참석자 ${attendees.length}명</div>
    ${attRows}`;

  document.getElementById('modalComments').innerHTML = `
    <div class="comment-section">
      <div class="comment-label">💬 댓글 · 대화</div>
      <div id="commentsList"></div>
      <div class="comment-input-row">
        <input class="comment-input" id="commentInput" placeholder="댓글을 입력하세요..." onkeydown="if(event.key==='Enter')sendComment('${m.id}')">
        <button class="comment-send" onclick="sendComment('${m.id}')">등록</button>
      </div>
    </div>`;

  listenComments(m.id);
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function setType(t) {
  selectedType = t;
  ['정기','번개'].forEach(v => {
    document.getElementById('toggle-'+v).className = 'type-toggle' + (v === t ? ' on' : '');
  });
}

function createMeeting() {
  const title    = document.getElementById('f-title').value.trim();
  const date     = document.getElementById('f-date').value;
  const time     = document.getElementById('f-time').value;
  const endtime  = document.getElementById('f-endtime').value;
  const locationSelect = document.getElementById('f-location').value;
  const locationCustom = document.getElementById('f-location-custom').value.trim();
  const location = locationSelect === '기타' ? locationCustom : locationSelect;
  const maxP     = parseInt(document.getElementById('f-max').value);
  const note     = document.getElementById('f-note').value.trim();

  if (!title)    { toast('모임 제목을 입력해주세요'); return; }
  if (!date)     { toast('날짜를 선택해주세요'); return; }
  if (!time)     { toast('시작 시간을 선택해주세요'); return; }
  if (!endtime)  { toast('종료 예상 시간을 선택해주세요'); return; }
  if (!location) { toast(locationSelect === '기타' ? '장소를 직접 입력해주세요' : '장소를 선택해주세요'); return; }

  const mid = Date.now().toString();
  db.ref('pingpong/meetings/' + mid).set({
    title, date, time, endtime, location, maxPlayers: maxP, note,
    type: selectedType,
    createdBy: ME.id,
    createdAt: Date.now()
  }).then(() => {
    toast('약속이 잡혔어요! 🎉');
    ['f-title','f-note','f-location-custom'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-location-custom').style.display = 'none';
    document.getElementById('f-time').value = '';
    document.getElementById('f-endtime').value = '';
    document.getElementById('f-location').value = '';
    setDefaultDate();
    gotoTab('home', document.getElementById('nav-home'));
  }).catch(() => toast('오류가 발생했어요. 다시 시도해주세요'));
}

function toggleCustomLocation(val) {
  const custom = document.getElementById('f-location-custom');
  if (val === '기타') {
    custom.style.display = 'block';
    custom.focus();
  } else {
    custom.style.display = 'none';
    custom.value = '';
  }
}

function setDefaultDate() {
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

function renderMembers() {
  const wrap = document.getElementById('memberListWrap');
  const list = Object.entries(users);
  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">아직 멤버가 없어요</div><div class="empty-sub">카카오 로그인하면 자동 등록돼요</div></div>`;
    return;
  }

  // 참석 횟수 계산
  const cnt = {};
  Object.values(meetings).forEach(m => {
    if (m.attendees) Object.keys(m.attendees).forEach(uid => { cnt[uid] = (cnt[uid]||0)+1; });
  });

  list.sort((a,b) => (cnt[b[0]]||0) - (cnt[a[0]]||0));

  wrap.innerHTML = `<div class="section-label">멤버 ${list.length}명</div>`
    + list.map(([uid, u]) => `
      <div class="member-card">
        ${u.img
          ? `<img class="member-ava" src="${u.img}">`
          : `<div class="member-ava-text">${(u.nickname||'?')[0]}</div>`}
        <div class="member-info">
          <div class="member-name">${u.nickname || '탁구인'}</div>
          <div class="member-stat">참석 ${cnt[uid]||0}회${u.grip ? ' · '+u.grip : ''}${u.rubber ? ' · '+u.rubber : ''}</div>
        </div>
        ${u.level ? `<span class="lvl-chip lvl-${u.level.includes('부')?'중급':u.level}">${u.level}</span>` : ''}
      </div>`).join('');
}

//  PROFILE
// ══════════════════════════════════════
function renderProfile() {
  if (!ME) return;
  db.ref('pingpong/users/' + ME.id).once('value', snap => {
    const u = snap.val() || {};
    ME.level     = u.level     || '';
    ME.grip      = u.grip      || '';
    ME.rubber    = u.rubber    || '';
    ME.gender    = u.gender    || '';
    ME.birthYear = u.birthYear || '';

    const avaHTML = ME.img
      ? `<img class="profile-ava" src="${ME.img}">`
      : `<div class="profile-ava-text">${ME.nickname[0]}</div>`;

    const myMeetings = Object.values(meetings).filter(m => m.createdBy === ME.id).length;
    const myAttend   = Object.values(meetings).filter(m => m.attendees && m.attendees[ME.id]).length;

    const tagStyle = 'display:inline-block;margin:3px 3px 0;padding:4px 10px;background:rgba(200,255,0,0.1);border:1px solid rgba(200,255,0,0.3);border-radius:20px;font-size:12px;color:var(--accent);';
    const tags = [ME.gender, ME.birthYear ? ME.birthYear+'년생' : '', ME.grip, ME.rubber, ME.level].filter(Boolean)
      .map(t => `<span style="${tagStyle}">${t}</span>`).join('');

    document.getElementById('profileHero').innerHTML = `
      <div class="profile-ava-wrap">${avaHTML}</div>
      <div class="profile-name">${ME.nickname}</div>
      <div style="margin-top:8px;">${tags || '<span style="color:var(--text3);font-size:13px;">아래에서 정보를 설정해주세요</span>'}</div>
      <div class="profile-stats">
        <div class="stat-box"><div class="stat-num">${myAttend}</div><div class="stat-lbl">참석한 모임</div></div>
        <div class="stat-box"><div class="stat-num">${myMeetings}</div><div class="stat-lbl">만든 모임</div></div>
        <div class="stat-box"><div class="stat-num">${Object.keys(users).length}</div><div class="stat-lbl">전체 멤버</div></div>
      </div>`;

    // 성별 버튼
    ['남성','여성'].forEach(v => {
      const el = document.getElementById('gbtn-'+v);
      if (el) el.className = 'level-btn' + (v === ME.gender ? ' on' : '');
    });
    // 출생년도
    const byEl = document.getElementById('birthYearInput');
    if (byEl && ME.birthYear) byEl.value = ME.birthYear;

    // 닉네임 입력란에 현재 닉네임 placeholder
    const ni = document.getElementById('nicknameInput');
    if (ni) ni.placeholder = ME.nickname || '닉네임을 입력하세요';

    // 그립 버튼
    ['쉐이크핸드','펜홀더','중펜'].forEach(v => {
      const el = document.getElementById('gbtn-'+v);
      if (el) el.className = 'level-btn' + (v === ME.grip ? ' on' : '');
    });
    // 러버 버튼
    ['일반러버','앞면핌플','뒷면핌플'].forEach(v => {
      const el = document.getElementById('rbtn-'+v);
      if (el) el.className = 'level-btn' + (v === ME.rubber ? ' on' : '');
    });
    // 레벨 버튼
    ['초급','8부','7부','6부','5부','4부','3부','2부','1부'].forEach(v => {
      const el = document.getElementById('lbtn-'+v);
      if (el) el.className = 'level-btn' + (v === ME.level ? ' on' : '');
    });
  });
}

function saveGender(gender) {
  if (!ME) return;
  db.ref('pingpong/users/' + ME.id + '/gender').set(gender).then(() => {
    ME.gender = gender;
    ['남성','여성'].forEach(v => {
      const el = document.getElementById('gbtn-'+v);
      if (el) el.className = 'level-btn' + (v === gender ? ' on' : '');
    });
    toast(`성별: "${gender}" 설정완료!`);
  });
}

function saveBirthYear() {
  if (!ME) return;
  const year = document.getElementById('birthYearInput').value;
  if (!year) { toast('출생년도를 선택해주세요'); return; }
  db.ref('pingpong/users/' + ME.id + '/birthYear').set(year).then(() => {
    ME.birthYear = year;
    toast(`${year}년생으로 설정됐어요!`);
    renderProfile();
  });
}

function saveNickname() {
  if (!ME) return;
  const input = document.getElementById('nicknameInput');
  const nickname = input.value.trim();
  if (!nickname) { toast('닉네임을 입력해주세요'); return; }
  if (nickname.length < 2) { toast('닉네임은 2자 이상이어야 해요'); return; }
  db.ref('pingpong/users/' + ME.id + '/nickname').set(nickname).then(() => {
    ME.nickname = nickname;
    input.value = '';
    toast('닉네임이 변경됐어요! 😊');
    renderProfile();
    renderHeaderAva();
  });
}

function saveGrip(grip) {
  if (!ME) return;
  db.ref('pingpong/users/' + ME.id + '/grip').set(grip).then(() => {
    ME.grip = grip;
    ['쉐이크핸드','펜홀더','중펜'].forEach(v => {

    });
    toast(`그립: "${grip}" 설정완료!`);

}

function saveRubber(rubber) {
  if (!ME) return;
  db.ref('pingpong/users/' + ME.id + '/rubber').set(rubber).then(() => {
    ME.rubber = rubber;
    ['일반러버','앞면핌플','뒷면핌플'].forEach(v => {
      const el = document.getElementById('rbtn-'+v);
      if (el) el.className = 'level-btn' + (v === rubber ? ' on' : '');
    });
    toast(`러버: "${rubber}" 설정완료!`);
  });
}

function saveLevel(lv) {
  if (!ME) return;
  db.ref('pingpong/users/' + ME.id + '/level').set(lv).then(() => {
    ME.level = lv;
    ['초급','8부','7부','6부','5부','4부','3부','2부','1부'].forEach(v => {
      const el = document.getElementById('lbtn-'+v);
      if (el) el.className = 'level-btn' + (v === lv ? ' on' : '');
    });
    toast(`레벨: "${lv}" 설정완료!`);
    renderProfile();
  });

// ══════════════════════════════════════
//  ADMIN PIN
// ══════════════════════════════════════
function openAdminPin() {
  if (isAdmin) { openAdmin(); return; }
  document.getElementById('pinInput').value = '';
  document.getElementById('pinModal').classList.add('open');
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}

function closePinModal() {
  document.getElementById('pinModal').classList.remove('open');
}

function checkPin() {
  const pin = document.getElementById('pinInput').value;
  if (pin === '0000') {
    isAdmin = true;
    document.getElementById('adminBadge').style.display = 'inline';
    closePinModal();
    openAdmin();
  } else {
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').placeholder = '틀렸어요!';
    setTimeout(() => document.getElementById('pinInput').placeholder = '••••', 1200);
  }
}

// ══════════════════════════════════════
//  ADMIN PANEL
// ══════════════════════════════════════
function openAdmin() {
  document.getElementById('adminOverlay').classList.add('open');
  renderAdminStats();
  renderAdminMeetings();
  renderAdminMembers();
  renderAdminChats();
  // 현재 공지 불러오기
  db.ref('pingpong/notice').once('value', snap => {
    const n = snap.val();
    if (n) document.getElementById('adminNoticeInput').value = n;
  });
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('open');
}

// ── 공지사항 ──
function saveNotice() {
  const txt = document.getElementById('adminNoticeInput').value.trim();
  if (!txt) { toast('공지 내용을 입력해주세요'); return; }
  db.ref('pingpong/notice').set(txt).then(() => toast('공지사항이 등록됐어요 📢'));
}

function clearNotice() {
  if (!confirm('공지사항을 삭제할까요?')) return;
  db.ref('pingpong/notice').remove().then(() => {
    document.getElementById('adminNoticeInput').value = '';
    toast('공지사항을 삭제했어요');
  });
}

// 공지사항 실시간 표시 (홈 화면)
function listenNotice() {
  db.ref('pingpong/notice').on('value', snap => {
    const bar = document.getElementById('noticeBar');
    const txt = snap.val();
    if (txt) {
      bar.textContent = '📢 ' + txt;
      bar.classList.add('show');
    } else {
      bar.classList.remove('show');
    }
  });
}

// ── 통계 ──
function renderAdminStats() {
  const cnt = {};
  Object.values(meetings).forEach(m => {
    if (m.attendees) Object.keys(m.attendees).forEach(uid => { cnt[uid] = (cnt[uid]||0)+1; });
  });
  const list = Object.entries(users)
    .map(([uid, u]) => ({ uid, name: u.nickname||'탁구인', count: cnt[uid]||0 }))
    .sort((a,b) => b.count - a.count);
  const max = list[0]?.count || 1;
  const el = document.getElementById('adminStats');
  if (!list.length) { el.innerHTML = '<div class="admin-row"><div class="admin-row-sub">멤버가 없어요</div></div>'; return; }
  el.innerHTML = list.map((m, i) => `
    <div class="stat-member-row">
      <div class="stat-rank ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-name">${m.name}</div>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.round(m.count/max*100)}%"></div></div>
      </div>
      <div class="stat-count">${m.count}</div>
    </div>`).join('');
}

// ── 모임 관리 ──
function renderAdminMeetings() {
  const list = Object.entries(meetings).sort((a,b) => b[1].date > a[1].date ? 1 : -1);
  const el = document.getElementById('adminMeetings');
  if (!list.length) { el.innerHTML = '<div class="admin-row"><div class="admin-row-sub">모임이 없어요</div></div>'; return; }
  el.innerHTML = list.map(([mid, m]) => {
    const cnt = m.attendees ? Object.keys(m.attendees).length : 0;
    return `<div class="admin-row">
      <div class="admin-row-info">
        <div class="admin-row-name">${m.title}</div>
        <div class="admin-row-sub">${m.date} ${m.time} · ${m.location} · 참석 ${cnt}명</div>
      </div>
      <button class="admin-btn admin-btn-red" onclick="adminDeleteMeeting('${mid}')">삭제</button>
    </div>`;
  }).join('');
}

function adminDeleteMeeting(mid) {
  const m = meetings[mid];
  if (!confirm(`"${m?.title}" 모임을 삭제할까요?`)) return;
  db.ref(`pingpong/meetings/${mid}`).remove().then(() => {
    toast('모임을 삭제했어요');
    renderAdminMeetings();
  });
}

// ── 멤버 관리 ──
function renderAdminMembers() {
  const el = document.getElementById('adminMembers');
  const list = Object.entries(users);
  if (!list.length) { el.innerHTML = '<div class="admin-row"><div class="admin-row-sub">멤버가 없어요</div></div>'; return; }
  el.innerHTML = list.map(([uid, u]) => `
    <div class="admin-row">
      <div class="admin-row-info">
        <div class="admin-row-name">${u.nickname||'탁구인'}</div>
        <div class="admin-row-sub">레벨: ${u.level||'미설정'}</div>
      </div>
      <select onchange="adminChangeLevel('${uid}', this.value)" style="padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:inherit;margin-right:6px;">
        <option value="">레벨변경</option>
        <option value="초급">초급</option>
        <option value="중급">중급</option>
        <option value="고급">고급</option>
        <option value="선수급">선수급</option>
      </select>
      <button class="admin-btn admin-btn-red" onclick="adminRemoveMember('${uid}','${u.nickname||''}')">탈퇴</button>
    </div>`).join('');
}

function adminChangeLevel(uid, level) {
  if (!level) return;
  db.ref(`pingpong/users/${uid}/level`).set(level).then(() => {
    toast(`레벨을 "${level}"로 변경했어요`);
    renderAdminMembers();
  });
}

function adminRemoveMember(uid, name) {
  if (!confirm(`"${name}" 멤버를 강제 탈퇴시킬까요?\n이 멤버의 모든 데이터가 삭제됩니다.`)) return;
  db.ref(`pingpong/users/${uid}`).remove().then(() => {
    toast(`${name} 멤버를 탈퇴처리했어요`);
    renderAdminMembers();
  });
}

// ── 채팅 관리 ──
function renderAdminChats() {
  db.ref('pingpong/chat').limitToLast(30).once('value', snap => {
    const data = snap.val() || {};
    const list = Object.entries(data).sort((a,b) => b[1].at - a[1].at);
    const el = document.getElementById('adminChats');
    if (!list.length) { el.innerHTML = '<div class="admin-row"><div class="admin-row-sub">채팅 내역이 없어요</div></div>'; return; }
    el.innerHTML = list.map(([id, m]) => {
      const u = users[m.uid] || { nickname: m.name||'탁구인' };
      const t = new Date(m.at).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
      return `<div class="admin-row">
        <div class="admin-row-info">
          <div class="admin-row-name">${u.nickname}</div>
          <div class="admin-row-sub">${escHtml(m.text)} · ${t}</div>
        </div>
        <button class="admin-btn admin-btn-red" onclick="adminDeleteChat('${id}', this)">삭제</button>
      </div>`;
    }).join('');
  });
}

function adminDeleteChat(id, btn) {
  if (!confirm('이 메시지를 삭제할까요?')) return;
  db.ref(`pingpong/chat/${id}`).remove().then(() => {
    btn.closest('.admin-row').remove();
    toast('메시지를 삭제했어요');
  });
}

// ══════════════════════════════════════
//  GLOBAL CHAT
// ══════════════════════════════════════
let chatListener = null;

function listenGlobalChat() {
  if (chatListener) return;
  const ref = db.ref('pingpong/chat').limitToLast(80);
  chatListener = ref.on('value', snap => {
    const data = snap.val() || {};
    const msgs = Object.entries(data).sort((a,b) => a[1].at - b[1].at);
    const el = document.getElementById('globalChatMessages');
    if (!el) return;
    if (msgs.length === 0) {
      el.innerHTML = `<div class="empty" style="padding:60px 20px;">
        <div class="empty-icon">💬</div>
        <div class="empty-title">채팅방에 오신 걸 환영해요!</div>
        <div class="empty-sub">동호회 멤버들과 자유롭게 대화하세요</div>
      </div>`;
      return;
    }
    let html = ''; let lastDate = '';
    msgs.forEach(([id, m]) => {
      const isMe = ME && m.uid === ME.id;
      const u = users[m.uid] || { nickname: m.name || '탁구인' };
      const d = new Date(m.at);
      const dateStr = `${d.getMonth()+1}월 ${d.getDate()}일`;
      const timeStr = d.toTimeString().slice(0,5);
      if (dateStr !== lastDate) {
        html += `<div class="chat-date-divider">── ${dateStr} ──</div>`;
        lastDate = dateStr;
      }
      const avaHTML = (u.img||m.img)
        ? `<div class="bubble-ava"><img src="${u.img||m.img}"></div>`
        : `<div class="bubble-ava">${(u.nickname||'?')[0]}</div>`;
      html += `
        <div class="chat-bubble-wrap ${isMe?'me':''}">
          ${isMe?'':avaHTML}
          <div class="bubble-content">
            ${isMe?'':` <div class="bubble-name">${u.nickname}</div>`}
            <div class="bubble ${isMe?'bubble-me':'bubble-other'}">${escHtml(m.text)}</div>
            <div class="bubble-time">${timeStr}</div>
          </div>
          ${isMe?avaHTML:''}
        </div>`;
    });
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  });
}

function sendGlobalChat() {
  if (!ME) return;
  const input = document.getElementById('globalChatInput');
  const text = input.value.trim();
  if (!text) return;
  db.ref('pingpong/chat').push({ uid:ME.id, name:ME.nickname, img:ME.img||'', text, at:Date.now() });
  input.value = '';
}

// ══════════════════════════════════════
//  MEETING COMMENTS
// ══════════════════════════════════════
let currentCommentMid = null;
let commentListener   = null;

function listenComments(mid) {
  if (commentListener && currentCommentMid)
    db.ref(`pingpong/meetings/${currentCommentMid}/comments`).off('value', commentListener);
  currentCommentMid = mid;
  commentListener = db.ref(`pingpong/meetings/${mid}/comments`).on('value', snap => {
    const data = snap.val() || {};
    const list = Object.entries(data).sort((a,b) => a[1].at - b[1].at);
    const el = document.getElementById('commentsList');
    if (!el) return;
    if (list.length === 0) {
      el.innerHTML = `<div style="text-align:center;color:var(--text3);font-size:13px;padding:12px 0;">첫 댓글을 남겨보세요!</div>`;
      return;
    }
    el.innerHTML = list.map(([id, c]) => {
      const u = users[c.uid] || { nickname: c.name||'탁구인' };
      const d = new Date(c.at);
      const ds = `${d.getMonth()+1}/${d.getDate()} ${d.toTimeString().slice(0,5)}`;
      return `<div class="comment-item">
        <div class="cmt-ava">${(u.nickname||'?')[0]}</div>
        <div class="cmt-body">
          <div class="cmt-name">${u.nickname}</div>
          <div class="cmt-text">${escHtml(c.text)}</div>
          <div class="cmt-time">${ds}</div>
        </div>
      </div>`;
    }).join('');
  });
}

function sendComment(mid) {
  if (!ME) return;
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;
  db.ref(`pingpong/meetings/${mid}/comments`).push({ uid:ME.id, name:ME.nickname, text, at:Date.now() });
  input.value = '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════
//  PWA 아이콘 & 매니페스트
// ══════════════════════════════════════
function setupPWA() {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');

  // 배경 (둥근 모서리)
  ctx.fillStyle = '#0d0d14';
  const r = 90, s = 512;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.arcTo(s, 0, s, s, r);
  ctx.arcTo(s, s, 0, s, r); ctx.arcTo(0, s, 0, 0, r);
  ctx.arcTo(0, 0, s, 0, r); ctx.closePath();
  ctx.fill();

  // 패들 본체
  ctx.fillStyle = '#c8ff00';
  ctx.beginPath();
  ctx.arc(210, 195, 148, 0, Math.PI * 2);
  ctx.fill();

  // 패들 안쪽 면
  ctx.fillStyle = 'rgba(0,0,0,0.13)';
  ctx.beginPath();
  ctx.arc(210, 195, 110, 0, Math.PI * 2);
  ctx.fill();

  // 패들 손잡이
  ctx.fillStyle = '#c8ff00';
  ctx.save();
  ctx.translate(300, 300);
  ctx.rotate(Math.PI * 0.77);
  ctx.beginPath();
  ctx.roundRect(-24, 0, 48, 155, 24);
  ctx.fill();
  ctx.restore();

  // 공
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(368, 362, 60, 0, Math.PI * 2);
  ctx.fill();
  // 공 광택
  ctx.fillStyle = 'rgba(200,255,0,0.35)';
  ctx.beginPath();
  ctx.arc(352, 344, 22, 0, Math.PI * 2);
  ctx.fill();

  const iconUrl = canvas.toDataURL('image/png');

  // iOS 아이콘
  const appleIcon = document.createElement('link');
  appleIcon.rel = 'apple-touch-icon';
  appleIcon.href = iconUrl;
  document.head.appendChild(appleIcon);

  // Android/Chrome PWA 매니페스트
  const manifest = {
    name: '핑퐁타임', short_name: '핑퐁타임',
    description: '탁구 모임 앱',
    start_url: '/pingpong-time/',
    scope: '/pingpong-time/',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#0d0d14',
    theme_color: '#0d0d14',
    icons: [{ src: iconUrl, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const mLink = document.createElement('link');
  mLink.rel = 'manifest';
  mLink.href = URL.createObjectURL(blob);
  document.head.appendChild(mLink);
}


function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}
